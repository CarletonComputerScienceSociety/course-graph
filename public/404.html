<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect trick.
      // When GH Pages 404s on a deep path, this encodes it into ?/path and
      // redirects to the app root, which serves index.html. The decode script
      // in index.html restores the real URL before React boots.
      // segmentCount = 1 for project pages (github.io/<repo-name>/).
      var pathSegmentsToKeep = 1; // 1 for project pages (github.io/<repo-name>/)
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
